services:
  frontend:
    build: ./mern/frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - mern-network
  backend:
    build: ./mern/backend
    ports:
      - "5050:5050"
    networks:
      - mern-network
    depends_on:
      - mongo
  mongo:
    container_name: mongodb
    image: mongo:latest
    ports:
      - "27017:27017"
    networks:
      - mern-network
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
networks:
  mern-network:
    external: true